name: word_town
description: "平行城市 · 灰烬之夜 - 单词叙事冒险"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0-225.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/characters/ephemeral/
    - assets/characters/tallow/
    - assets/characters/cinder/
    - assets/characters/heloise/
    - assets/decorations/
    - assets/endings/
    - assets/icons/
    - assets/scenes/letter/
    - assets/audio/
